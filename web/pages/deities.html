<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神格一覧 | 神話 OS</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="../index.html">
      <img src="../images/logo.svg" alt="" width="40" height="40">
      <span class="brand-name">神話 OS</span>
      <span class="brand-tag">日本神話・神道史データベース</span>
    </a>
    <nav class="main-nav">
      <a href="../index.html">ホーム</a>
      <a href="shrines.html">神社</a>
      <a href="deities.html" class="active">神格</a>
      <a href="clans.html">氏族</a>
      <a href="relations.html">関係探索</a>
      <a href="about.html">本基盤について</a>
    </nav>
  </div>
</header>

<main class="list-page">
  <div class="container">
    <h1 class="section-title">神格一覧</h1>
    <p class="section-lead" id="listIntro">読み込み中…</p>

    <div class="list-controls">
      <input type="search" id="searchInput" placeholder="神名・読み・別名で検索…">
      <select id="categoryFilter"><option value="">すべての category</option></select>
      <select id="genderFilter">
        <option value="">性別すべて</option>
        <option value="男">男神</option>
        <option value="女">女神</option>
      </select>
      <span class="list-stats" id="listStats">—</span>
    </div>

    <div id="loading" class="loading">データを読み込んでいます</div>
    <div class="table-wrap" id="deityTableWrap" hidden>
      <table class="list-table" id="deityTable">
        <thead>
          <tr>
            <th class="col-id">ID</th>
            <th>名称 / 読み</th>
            <th>category</th>
            <th class="col-meta">主要文献</th>
            <th class="col-meta">notes</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <p id="empty" class="empty" hidden>該当する神格が見つかりませんでした。</p>
  </div>
</main>

<footer class="site-footer"><div class="container"><p>© 神話 OS / Civilization OS Database</p></div></footer>

<script src="../js/tsv_parser.js"></script>
<script src="../js/data_loader.js"></script>
<script src="../js/deities.js"></script>
</body>
</html>
