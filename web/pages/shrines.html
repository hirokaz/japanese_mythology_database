<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神社一覧 | 神話 OS</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="../index.html">
      <img src="../images/logo.svg" alt="" width="40" height="40">
      <span class="brand-name">神話 OS</span>
      <span class="brand-tag">日本神話・神道史データベース</span>
    </a>
    <nav class="main-nav">
      <a href="../index.html">ホーム</a>
      <a href="shrines.html" class="active">神社</a>
      <a href="deities.html">神格</a>
      <a href="clans.html">氏族</a>
      <a href="relations.html">関係探索</a>
      <a href="about.html">本基盤について</a>
    </nav>
  </div>
</header>

<main class="list-page">
  <div class="container">
    <h1 class="section-title">神社一覧</h1>
    <p class="section-lead" id="listIntro">読み込み中…</p>

    <div class="list-controls">
      <input type="search" id="searchInput" placeholder="名前・読み・別名・所在地で検索…">
      <select id="prefFilter"><option value="">すべての都道府県</option></select>
      <select id="rankFilter"><option value="">すべての社格</option></select>
      <span class="list-stats" id="listStats">—</span>
    </div>

    <div id="loading" class="loading">データを読み込んでいます</div>

    <table class="list-table" id="shrineTable" hidden>
      <thead>
        <tr>
          <th class="col-id">ID</th>
          <th>名称 / 読み</th>
          <th>所在地</th>
          <th class="col-meta">主祭神</th>
          <th class="col-meta">社格</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <p id="empty" class="empty" hidden>該当する神社が見つかりませんでした。</p>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <p>© 神話 OS / Civilization OS Database</p>
  </div>
</footer>

<script src="../js/tsv_parser.js"></script>
<script src="../js/data_loader.js"></script>
<script src="../js/shrines.js"></script>
</body>
</html>
