<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>関係探索 | 神話 OS</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="../index.html">
      <img src="../images/logo.svg" alt="" width="40" height="40">
      <span class="brand-name">神話 OS</span>
      <span class="brand-tag">日本神話・神道史データベース</span>
    </a>
    <nav class="main-nav">
      <a href="../index.html">ホーム</a>
      <a href="shrines.html">神社</a>
      <a href="deities.html">神格</a>
      <a href="clans.html">氏族</a>
      <a href="relations.html" class="active">関係探索</a>
      <a href="about.html">本基盤について</a>
    </nav>
  </div>
</header>

<main class="list-page">
  <div class="container">
    <h1 class="section-title">関係探索</h1>
    <p class="section-lead" id="listIntro">読み込み中…</p>

    <div class="list-controls">
      <input type="search" id="idInput" placeholder="ID(例: SHR-016, DEI-181, CLN-001)" style="max-width:240px;">
      <select id="typeFilter">
        <option value="">全関係タイプ</option>
      </select>
      <select id="layerFilter">
        <option value="">全確実性層</option>
        <option value="L0">L0(史料記載)</option>
        <option value="L1">L1(研究解釈)</option>
        <option value="L2">L2(複数研究者推定)</option>
        <option value="L3">L3(伝承)</option>
        <option value="L4">L4(大胆仮説)</option>
      </select>
      <span class="list-stats" id="listStats">—</span>
    </div>

    <div id="loading" class="loading">データを読み込んでいます</div>
    <table class="list-table" id="relTable" hidden>
      <thead><tr>
        <th class="col-id">RLN ID</th>
        <th>ソース</th>
        <th>関係</th>
        <th>ターゲット</th>
        <th class="col-meta">層</th>
        <th class="col-meta">出典</th>
      </tr></thead>
      <tbody></tbody>
    </table>
    <p id="empty" class="empty" hidden>該当する関係が見つかりませんでした。</p>
  </div>
</main>

<footer class="site-footer"><div class="container"><p>© 神話 OS / Civilization OS Database</p></div></footer>

<script src="../js/tsv_parser.js"></script>
<script src="../js/data_loader.js"></script>
<script src="../js/relations.js"></script>
</body>
</html>
